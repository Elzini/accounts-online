<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل - Elzini SaaS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #3b82f6; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1e40af; color: white; border: none;
      padding: 12px 28px; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .cached-pages { margin-top: 32px; padding-top: 24px; border-top: 1px solid #1e293b; }
    .cached-pages h3 { font-size: 0.85rem; color: #64748b; margin-bottom: 12px; }
    .status { margin-top: 16px; font-size: 0.8rem; color: #475569; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M2 2l20 20"/>
      </svg>
    </div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>هذه الصفحة غير متاحة حالياً في وضع عدم الاتصال. سيتم إعادة المحاولة تلقائياً عند استعادة الاتصال.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
      </svg>
      إعادة المحاولة
    </button>
    <div class="status" id="status">
      جاري مراقبة الاتصال...
    </div>
  </div>
  <script>
    window.addEventListener('online', () => window.location.reload());
    if (navigator.onLine) window.location.reload();
    setInterval(() => {
      if (navigator.onLine) window.location.reload();
    }, 3000);
  </script>
</body>
</html>
